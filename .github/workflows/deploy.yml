name: Build and Deploy Full Site

on:
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-deploy]

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_PAT }}

      - name: Checkout Tangent-nav (gh-pages)
        uses: actions/checkout@v4
        with:
          repository: SixingWang2025/Tangent-nav
          ref: gh-pages
          path: _tmp_nav
          token: ${{ secrets.MY_PAT }}

      - name: Copy Tangent-nav to /nav
        run: |
          rm -rf nav
          mkdir -p nav
          cp -r _tmp_nav/* nav/
          rm -rf _tmp_nav

      - name: Checkout Tangent-blog (gh-pages)
        uses: actions/checkout@v4
        with:
          repository: SixingWang2025/Tangent-blog
          ref: gh-pages
          path: _tmp_blog
          token: ${{ secrets.MY_PAT }}

      - name: Copy Tangent-blog to /blog
        run: |
          rm -rf blog
          mkdir -p blog
          cp -r _tmp_blog/* blog/
          rm -rf _tmp_blog

      - name: Checkout Tangent-page (gh-pages)
        uses: actions/checkout@v4
        with:
          repository: SixingWang2025/Tangent-page
          ref: gh-pages
          path: _tmp_page
          token: ${{ secrets.MY_PAT }}

      - name: Copy Tangent-page to /page
        run: |
          rm -rf page
          mkdir -p page
          cp -r _tmp_page/* page/
          rm -rf _tmp_page

      - name: Prevent Jekyll processing
        run: touch .nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4